name: Staging Readiness

on:
  push:
    branches: [dev]

jobs:
  e2e:
    name: E2E — Playwright vs Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tests/playwright/requirements.txt

      - name: Install dependencies
        working-directory: tests/playwright
        run: |
          pip install -r requirements.txt
          python3 -m playwright install chromium
          python3 -m playwright install-deps chromium

      # Wait for Render to finish deploying (up to 5 minutes after the push)
      - name: Wait for staging deploy
        run: |
          echo "Waiting for staging to become ready..."
          STAGING_URL="https://crm-staging-sn50.onrender.com/login"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$STAGING_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "Staging is ready."
              exit 0
            fi
            sleep 10
          done
          echo "Staging did not respond after 5 minutes."
          exit 1

      - name: Run Playwright tests
        working-directory: tests/playwright
        run: python3 -m pytest --tb=short -q --junitxml=results.xml

      - name: Upload evidence screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence
          path: tests/playwright/evidence/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: tests/playwright/results.xml
          retention-days: 14

      - name: Readiness summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Staging Readiness: PASS" >> $GITHUB_STEP_SUMMARY
            echo "All 22 E2E tests passed. Safe to merge dev → main." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Staging Readiness: FAIL" >> $GITHUB_STEP_SUMMARY
            echo "One or more E2E tests failed. Do NOT push to production." >> $GITHUB_STEP_SUMMARY
            echo "Download the **playwright-evidence** artifact to see screenshots." >> $GITHUB_STEP_SUMMARY
          fi
