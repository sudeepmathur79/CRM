version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://crm_user:crm_password@postgres:5432/crm
      JWT_SECRET: ${JWT_SECRET:-supersecretchangeme32charslong!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refreshsecretchangeme32charslong}
      PORT: 5000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHISPER_ENABLED: ${WHISPER_ENABLED:-false}
      STORAGE_PATH: /app/uploads
      AGENT_INTERVAL: ${AGENT_INTERVAL:-300000}
      DIGEST_HOUR: ${DIGEST_HOUR:-8}
      DIGEST_MINUTE: ${DIGEST_MINUTE:-0}
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node src/index.js"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
