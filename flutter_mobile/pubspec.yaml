name: salesflow_crm
description: SalesFlow CRM — Voice capture for sales teams
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1
  dio: ^5.4.3

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Audio recording
  record: ^5.1.2

  # Permissions
  permission_handler: ^11.3.1

  # State management
  provider: ^6.1.2

  # File handling
  path_provider: ^2.1.3

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
